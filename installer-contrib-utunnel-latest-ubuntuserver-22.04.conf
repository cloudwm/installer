#
# UTunnel Access Gateway — Ubuntu Server 22.04
#
# Self-hosted VPN gateway. Clients connect TO this VM. UTunnel terminates its
# own TLS on TCP 443 and is administered from the utunnel.io cloud dashboard,
# so this contrib does NOT install nginx or any TLS-terminating proxy.
#
# After install, SSH into the VM and follow the MOTD instructions to register
# the gateway with a token from your utunnel.io dashboard.
#

. installer-contrib-tweaks-preinstall.conf

execute+=(include/installInProgressSSH)
execute+=(tweaks/ubuntu-ufw-enable)
execute+=(tweaks/ubuntu-updateos)

. installer-contrib-tweaks-optimize.conf

execute+=(services/utunnel-latest-offisrc)

execute+=(tweaks/motd-header-tweak)
execute+=(tweaks/motd-description-append)
execute+=(tweaks/cwm-description-autoconfig)

execute+=(include/installInProgressSSH-remove)
