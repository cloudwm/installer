services:
  manager:
    build:
      context: .
      dockerfile: Dockerfile.manager
    container_name: farm-manager
    restart: unless-stopped
    environment:
      - PUBLIC_IP=${PUBLIC_IP}
      - AUTH_PASS=${AUTH_PASS}
      - SECRET_KEY=${SECRET_KEY}
      - EMULATOR_DATA=/opt/android-emulator/emulators
      - FARM_DIR=/opt/android-emulator
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/android-emulator:/opt/android-emulator
      - /proc:/host_proc:ro
      - uploads:/app/uploads
    networks:
      - farm-network
    ports:
      - "5000:5000"

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - manager
    networks:
      - farm-network

volumes:
  uploads:

networks:
  farm-network:
    driver: bridge
